<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

  :root {
    --bg: #0a0e2e;
    --panel: #151a3e;
    --card: #1e2550;
    --border: #2d3470;
    --accent: #7c6aff;
    --gold: #ffd440;
    --text: #e8ecff;
    --radius: 16px;
    --bottle-trans: 0.15s;
    --lift-dur: 0.17s;
    --seg-dur: 0.24s;
    --shake-dur: 0.23s;
    --hint-b-dur: 0.54s;
    --hint-g-dur: 0.6s;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--text);
    overflow-x: hidden;
    background-image:

      radial-gradient(ellipse at 80% 80%, rgba(255,100,150,0.1) 0%, transparent 50%);
  }

  header {
    width: 100%;
    max-width: 480px;
    padding: 20px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .level-badge {
    background: linear-gradient(135deg, #ff4e6a, #ff8c42);
    border-radius: 12px;
    padding: 6px 18px;
    font-size: 1.1rem;
    font-weight: 900;
    box-shadow: 0 4px 15px rgba(255,78,106,0.4);

  .moves-badge {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 6px 18px;
    font-size: 0.95rem;
    font-weight: 800;
  }

  .moves-badge span { color: var(--gold); }

  #game-area {
    width: 100%;
    max-width: 480px;
    padding: 24px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
  }

  .bottle-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    gap: 6px;
    transition: transform var(--bottle-trans) cubic-bezier(0.34, 1.56, 0.64, 1),
                filter var(--bottle-trans) ease;
    will-change: transform;
  }

  .bottle-wrap:hover:not(.selected) { transform: translateY(-5px); }

  .bottle-wrap.selected {
    transform: translateY(-18px);
    animation: liftUp var(--lift-dur) cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  .bottle-wrap.hint-from {
    transform: translateY(-14px);
    animation: hintFromBounce var(--hint-b-dur) cubic-bezier(0.34,1.56,0.64,1) infinite alternate;
  }

  .bottle-wrap.hint-to .bottle-outer {
    animation: hintToGlow var(--hint-g-dur) ease-in-out infinite alternate;
  }

  @keyframes hintFromBounce {
    0%   { transform: translateY(-6px); }
    100% { transform: translateY(-18px); }
  }

  @keyframes hintToGlow {
    0%   { box-shadow: inset 0 2px 8px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.3); }
    100% { box-shadow: inset 0 2px 8px rgba(0,0,0,0.3), 0 0 0 3px #7dda58, 0 4px 24px #7dda5850; }
  }

  @keyframes liftUp {
    0%   { transform: translateY(0px); }
    60%  { transform: translateY(-22px); }
    100% { transform: translateY(-18px); }
  }

  .bottle-wrap.selected .bottle-outer {
    box-shadow: 0 0 0 3px var(--gold), 0 12px 40px rgba(255,212,64,0.5);
  }

  .bottle-wrap.shake {
    animation: shake var(--shake-dur) ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .bottle-outer {
    width: 54px;
    height: 130px;
    border-radius: 8px 8px 20px 20px;
    border: 3px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.06);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    position: relative;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.3);
    transition: box-shadow 0.2s;
  }

  /* Glass shine */
  .bottle-outer::before {
    content: '';
    position: absolute;
    top: 6px; left: 8px;
    width: 8px; height: 40px;
    border-radius: 4px;
    background: rgba(255,255,255,0.25);
    z-index: 10;
    pointer-events: none;
  }

  .bottle-neck {
    width: 28px;
    height: 20px;
    border-radius: 6px 6px 0 0;
    border: 3px solid rgba(255,255,255,0.18);
    border-bottom: none;
    background: rgba(255,255,255,0.06);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
  }

  .color-segment {
    width: 100%;
    transition: height var(--seg-dur) cubic-bezier(0.34,1.56,0.64,1);
  }

  .bottle-label {
    font-size: 0.65rem;
    font-weight: 800;
    opacity: 0.5;
    letter-spacing: 0.05em;
  }

  /* Win overlay */
  #win-overlay, #gameover-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,14,46,0.85);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    backdrop-filter: blur(8px);
  }

  #win-overlay.show, #gameover-overlay.show { display: flex; }

  .win-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 40px 48px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .win-emoji { font-size: 3rem; }
  .win-title { font-size: 2rem; font-weight: 900; color: var(--gold); margin: 8px 0; }
  .win-stars { font-size: 2.2rem; margin: 4px 0; letter-spacing: 4px; }
  .win-stars .star-empty { opacity: 0.2; filter: grayscale(1); }
  .win-sub { font-size: 0.95rem; opacity: 0.7; margin: 2px 0; }
  .win-par { font-size: 0.8rem; opacity: 0.45; margin-top: 2px; }

  @keyframes starPop {
    0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
    60%  { transform: scale(1.3) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .win-stars span {
    display: inline-block;
    animation: starPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .win-stars span:nth-child(2) { animation-delay: 0.1s; }
  .win-stars span:nth-child(3) { animation-delay: 0.2s; }

  .btn {
    margin-top: 0;
    padding: 8px 16px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.85rem;
    white-space: nowrap;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .btn:active { transform: scale(0.95); }

  .btn-primary {
    background: linear-gradient(135deg, #7c6aff, #5a4dcc);
    color: white;
    box-shadow: 0 4px 20px rgba(124,106,255,0.5);
  }

  .btn-secondary {
    background: var(--panel);
    border: 2px solid var(--border);
    color: var(--text);
  }

  .btn-hint {
    background: #1a2a1a;
    border: 2px solid #2a4a2a;
    color: #7dda58;
    position: relative;
    transition: all 0.2s;
  }

  .btn-hint:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .hint-flash {
    animation: hintPulse 0.6s ease 2;
  }

  @keyframes hintPulse {
    0%,100% { box-shadow: none; }
    50%      { box-shadow: 0 0 0 4px #7dda5840, 0 0 20px #7dda5830; }
  }

  .controls {
    display: flex;
    flex-wrap: nowrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  #hint-text {
    text-align: center;
    font-size: 0.82rem;
    opacity: 0.55;
    min-height: 18px;
    padding: 4px 20px 0;
    width: 100%;
    max-width: 480px;
  }

  /* ── Pour animation overlay ── */
  #pour-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
  }

  .pour-clone {
    position: fixed;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .pour-clone .clone-neck {
    width: 28px; height: 20px;
    border-radius: 6px 6px 0 0;
    border: 3px solid rgba(255,255,255,0.22);
    border-bottom: none;
    background: rgba(255,255,255,0.08);
  }

  .pour-clone .clone-body {
    width: 54px; height: 130px;
    border-radius: 8px 8px 20px 20px;
    border: 3px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.06);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 3px var(--gold), 0 14px 40px rgba(255,212,64,0.5);
    position: relative;
  }

  .pour-clone .clone-body::before {
    content: '';
    position: absolute;
    top: 6px; left: 8px;
    width: 8px; height: 40px;
    border-radius: 4px;
    background: rgba(255,255,255,0.25);
    z-index: 10;
    pointer-events: none;
  }

  .pour-clone .clone-seg {
    width: 100%;
  }

  @keyframes bottlePour {
    0%   { transform: translate(0px, 0px) rotate(0deg); }
    28%  { transform: translate(var(--tx), var(--ty)) rotate(0deg); }
    48%  { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); }
    78%  { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); }
    100% { transform: translate(0px, 0px) rotate(0deg); }
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    overflow: hidden;
  }

  .star {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: starFly 1s ease forwards;
  }

  @keyframes starFly {
    0% { transform: translate(0,0) scale(0); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 0; }
  }

  select {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text);

    font-size: 0.9rem;
    padding: 6px 12px;
    cursor: pointer;

  /* ── 진행 현황 버튼 ── */
  .btn-progress {
    background: #0f1e3a;
    border: 2px solid #1e3a6a;
    color: #60a5fa;
    font-size: 0.8rem;

  }

  /* ── 진행 현황 오버레이 ── */
  #progress-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,14,46,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px;
    backdrop-filter: blur(8px);
    overflow-y: auto;
  }
  #progress-overlay.show { display: flex; }

  .progress-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 460px;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .progress-title {
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--text);
  }

  .progress-close {
    background: none;
    border: none;
    color: #8b949e;
    font-size: 1.4rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
  }
  .progress-close:hover { background: var(--border); color: white; }

  .progress-summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .summary-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }

  .summary-box .val {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--gold);
    display: block;
  }

  .summary-box .lbl {
    font-size: 0.7rem;
    color: #8b949e;
    margin-top: 2px;
    display: block;
  }

  .progress-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .prog-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.2s;
    position: relative;
    gap: 2px;
    padding: 4px;
  }

  .prog-cell:hover { transform: scale(1.05); border-color: #4a6080; }
  .prog-cell:active { transform: scale(0.97); }

  .prog-cell.cleared {
    background: #0a1f0a;
    border-color: #1a4a1a;
  }

  .prog-cell.current {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold), 0 0 10px rgba(255,212,64,0.3);
  }

  .prog-cell .cell-num {
    font-size: 0.65rem;
    font-weight: 800;
    color: #4a6080;
    line-height: 1;
  }

  .prog-cell.cleared .cell-num { color: #4a8a4a; }

  .prog-cell .cell-stars {
    font-size: 0.55rem;
    line-height: 1;
    letter-spacing: -1px;
  }

  .prog-cell .cell-diff {
    font-size: 0.55rem;
    line-height: 1;
  }

  .progress-footer {
    margin-top: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .progress-reset-btn {
    background: none;
    border: 1px solid #4a1a1a;
    color: #ff4e6a;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
  }
  .progress-reset-btn:hover { background: #2a0a0a; }

  .select-option-cleared::after { content: ' ✓'; }



</style>

const BOTTLE_CAPACITY = 4;
let bottles = [];

// ── Audio ───────────────────────────────────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playPourSound(color, duration = 0.45) {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime + 0.01;

    function synthesizeDrop(when, freq, freqEnd, decay, pitchDecay, clickAmp, bubbleAmp, reverbAmp) {
      // ── 1. 충격 click ─────────────────────────────────────
      const sr = ctx.sampleRate;
      const clickLen = Math.floor(sr * 0.003);
      const clickBuf = ctx.createBuffer(1, clickLen, sr);
      const cd = clickBuf.getChannelData(0);
      for (let i = 0; i < clickLen; i++)
        cd[i] = (Math.random()*2-1) * Math.exp(-i * 800 / sr) * clickAmp;
      const clickSrc = ctx.createBufferSource();
      clickSrc.buffer = clickBuf;
      const clickGain = ctx.createGain(); clickGain.gain.value = 1;
      clickSrc.connect(clickGain); clickGain.connect(ctx.destination);
      clickSrc.start(when);

      // ── 2. 공기방울 진동 (핵심 "퐁당" 음정) ──────────────
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, when);
      osc.frequency.exponentialRampToValueAtTime(freqEnd, when + pitchDecay);

      const env = ctx.createGain();
      env.gain.setValueAtTime(0, when);
      env.gain.linearRampToValueAtTime(bubbleAmp, when + 0.002);
      env.gain.exponentialRampToValueAtTime(0.0001, when + decay);

      const wave = ctx.createWaveShaper();
      const curve = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        const x = (i * 2) / 256 - 1;
        curve[i] = (Math.PI + 8) * x / (Math.PI + 8 * Math.abs(x));
      }
      wave.curve = curve;
      wave.oversample = '2x';

      osc.connect(wave); wave.connect(env); env.connect(ctx.destination);
      osc.start(when); osc.stop(when + decay + 0.05);

      // ── 3. 저역 여운 ──────────────────────────────────────
      if (reverbAmp > 0) {
        const rOsc = ctx.createOscillator();
        rOsc.type = 'sine';
        rOsc.frequency.value = freq * 0.45;
        const rEnv = ctx.createGain();
        rEnv.gain.setValueAtTime(0, when + 0.003);
        rEnv.gain.linearRampToValueAtTime(reverbAmp, when + 0.01);
        rEnv.gain.exponentialRampToValueAtTime(0.0001, when + decay * 1.8);
        const lp = ctx.createBiquadFilter();
        lp.type = 'lowpass'; lp.frequency.value = 800;
        rOsc.connect(lp); lp.connect(rEnv); rEnv.connect(ctx.destination);
        rOsc.start(when); rOsc.stop(when + decay * 2);
      }
    }

    // ── 퐁당: 460→185Hz, 저역 울림 ───────────────────────────
    synthesizeDrop(now, 460, 185, 0.38, 0.28, 0.7, 0.65, 0.12);

    // 저역 "쿵" 울림
    const thudOsc = ctx.createOscillator();
    thudOsc.type = 'sine';
    thudOsc.frequency.setValueAtTime(80, now);
    thudOsc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
    const thudEnv = ctx.createGain();
    thudEnv.gain.setValueAtTime(0, now);
    thudEnv.gain.linearRampToValueAtTime(0.18, now + 0.005);
    thudEnv.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
    thudOsc.connect(thudEnv); thudEnv.connect(ctx.destination);
    thudOsc.start(now); thudOsc.stop(now + 0.2);

  } catch(e) { console.warn('audio', e); }
}





function playCompleteSound() {
  try {
    const ctx = getAudioCtx();
    const t = ctx.currentTime;
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.frequency.value = freq;
      osc.type = 'sine';
      const st = t + i * 0.1;
      g.gain.setValueAtTime(0, st);
      g.gain.linearRampToValueAtTime(0.15, st + 0.04);
      g.gain.linearRampToValueAtTime(0, st + 0.25);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(st); osc.stop(st + 0.3);
    });
  } catch(e) {}
}

// ── Level load ──────────────────────────────────────────
function loadLevel(idx) {
  currentLevel = idx;
  const lvl = LEVELS[idx];
  bottles = lvl.bottles.map(b => [...b].reverse());
  selected = null;
  moves = 0;
  history = [];
  isAnimating = false;
  document.getElementById('move-count').textContent = 0;
  document.getElementById('level-label').textContent = lvl.name;
  document.getElementById('level-select').value = idx;
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('hint-text').textContent = '병을 탭해서 선택하고, 다른 병에 부어보세요!';
  document.getElementById('pour-overlay').innerHTML = '';
  resetHints();
  buildDOM();
  updateDOM();
}

function resetLevel() { loadLevel(currentLevel); }
function nextLevel() {
  const next = (currentLevel + 1) % LEVELS.length;
  loadLevel(next);
  document.getElementById('level-select').value = next;
}

// ── DOM build / update ──────────────────────────────────
function buildDOM() {
  const area = document.getElementById('game-area');
  area.innerHTML = '';
  bottles.forEach((_, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'bottle-wrap';
    wrap.id = `wrap-${i}`;
    wrap.onclick = () => handleClick(i);

    const neck = document.createElement('div');
    neck.className = 'bottle-neck';
    wrap.appendChild(neck);

    const outer = document.createElement('div');
    outer.className = 'bottle-outer';
    outer.id = `bottle-${i}`;
    for (let s = 0; s < BOTTLE_CAPACITY; s++) {
      const seg = document.createElement('div');
      seg.className = 'color-segment';
      seg.style.height = (100 / BOTTLE_CAPACITY) + '%';
      outer.appendChild(seg);
    }
    wrap.appendChild(outer);
    area.appendChild(wrap);
  });
}

function updateDOM() {
  bottles.forEach((bottle, i) => {
    const wrap = document.getElementById(`wrap-${i}`);
    if (!wrap) return;

    wrap.classList.toggle('selected', selected === i);
    wrap.style.filter = isBottleComplete(bottle)
      ? 'drop-shadow(0 0 12px ' + COLORS[bottle[0]].bg + ')'
      : '';

    const outer = document.getElementById(`bottle-${i}`);
    const segs = outer.querySelectorAll('.color-segment');
    const emptySlots = BOTTLE_CAPACITY - bottle.length;
    for (let s = 0; s < BOTTLE_CAPACITY; s++) {
      const seg = segs[s];
      if (s < emptySlots) {
        seg.style.background = 'transparent';
        seg.style.boxShadow = '';
      } else {
        const color = bottle[s - emptySlots];
        const cdata = COLORS[color];
        seg.style.background = cdata.bg;
        seg.style.boxShadow = `inset 0 2px 0 rgba(255,255,255,0.22), inset 0 -1px 0 ${cdata.border}`;
      }
    }
  });
}

// ── Game logic ──────────────────────────────────────────
function isBottleComplete(bottle) {
  return bottle.length === BOTTLE_CAPACITY && bottle.every(c => c === bottle[0]);
}

function checkWin() {
  return bottles.every(b => b.length === 0 || isBottleComplete(b));
}

// ── 상태를 문자열 키로 직렬화 (방문 체크용) ─────────────────
function stateKey(state) {
  return state.map(b => b.join(',')).join('|');
}

// ── 상태에서 가능한 모든 이동 후 상태 목록 반환 ──────────────
function getNextStates(state) {
  const n = state.length;
  const results = [];
  for (let from = 0; from < n; from++) {
    const src = state[from];
    if (src.length === 0 || (src.length === BOTTLE_CAPACITY && src.every(c => c === src[0]))) continue;
    const topColor = src[0];
    // 연속 같은 색 개수
    let count = 0;
    for (let i = 0; i < src.length; i++) {
      if (src[i] === topColor) count++; else break;
    }
    for (let to = 0; to < n; to++) {
      if (from === to) continue;
      const dst = state[to];
      if (dst.length >= BOTTLE_CAPACITY) continue;
      if (dst.length > 0 && dst[0] !== topColor) continue;
      // 빈 병으로 이동: 출발 병이 이미 단색이면 의미없음 (무한루프 방지)
      if (dst.length === 0 && src.every(c => c === topColor)) continue;
      const pour = Math.min(count, BOTTLE_CAPACITY - dst.length);
      // 새 상태 생성
      const newState = state.map(b => [...b]);
      const poured = newState[from].splice(0, pour);
      newState[to].unshift(...poured);
      results.push(newState);
    }
  }
  return results;
}

// ── 현재 상태가 win 상태인지 ──────────────────────────────────
function isWinState(state) {
  return state.every(b => b.length === 0 || (b.length === BOTTLE_CAPACITY && b.every(c => c === b[0])));
}

// ── BFS로 현재 상태에서 클리어 가능한지 탐색 ─────────────────
// maxNodes: 탐색 한도 (초과 시 "모름" → false 반환해서 게임오버 안 띄움)
function isSolvable(initState, maxNodes = 3000) {
  const visited = new Set();
  const queue = [initState];
  visited.add(stateKey(initState));
  let checked = 0;

  while (queue.length > 0) {
    const state = queue.shift();
    checked++;
    if (checked > maxNodes) return true; // 탐색 한도 초과 → 모름 → 게임오버 안 띄움

    for (const next of getNextStates(state)) {
      if (isWinState(next)) return true;
      const key = stateKey(next);
      if (!visited.has(key)) {
        visited.add(key);
        queue.push(next);
      }
    }
  }
  return false; // 모든 상태 탐색했는데 win 없음 → 확실히 불가
}

// ── 게임오버 판정 ─────────────────────────────────────────────
function checkGameOver() {
  return !isSolvable(bottles.map(b => [...b]));
}

function canPour(from, to) {
  const src = bottles[from], dst = bottles[to];
  if (src.length === 0) return false;
  if (dst.length >= BOTTLE_CAPACITY) return false;
  if (dst.length > 0 && dst[0] !== src[0]) return false;
  return true;
}

function doPour(from, to) {
  const src = bottles[from], dst = bottles[to];
  const topColor = src[0];
  let count = 0;
  for (let i = 0; i < src.length; i++) {
    if (src[i] === topColor) count++;
    else break;
  }
  const pour = Math.min(count, BOTTLE_CAPACITY - dst.length);
  history.push({ from, to, fromSnap: [...src], toSnap: [...dst] });
  const poured = src.splice(0, pour);
  dst.unshift(...poured);
}

function handleClick(idx) {
  if (isAnimating) return;
  if (selected === null) {
    if (bottles[idx].length === 0) return;
    if (isBottleComplete(bottles[idx])) return;
    clearHintHighlight();
    selected = idx;
    updateDOM();
  } else {
    if (selected === idx) {
      selected = null;
      updateDOM();
      return;
    }
    if (canPour(selected, idx)) {
      const fromIdx = selected;
      const toIdx = idx;
      selected = null;
      updateDOM();
      animatePour(fromIdx, toIdx, () => {
        doPour(fromIdx, toIdx);
        moves++;
        document.getElementById('move-count').textContent = moves;
        updateDOM();
        if (checkWin()) {
          setTimeout(showWin, 210);
        } else if (checkGameOver()) {
          setTimeout(showGameOver, 240);
        }
      });
    } else {
      selected = null;
      updateDOM();
      const el = document.getElementById(`wrap-${idx}`);
      el.classList.add('shake');
      setTimeout(() => el.classList.remove('shake'), 240);
      document.getElementById('hint-text').textContent = '부을 수 없어요! 같은 색이거나 빈 병만 가능해요.';
    }
  }
}

function undoMove() {
  if (history.length === 0 || isAnimating) return;
  const last = history.pop();
  bottles[last.from] = last.fromSnap;
  bottles[last.to] = last.toSnap;
  moves = Math.max(0, moves - 1);
  document.getElementById('move-count').textContent = moves;
  selected = null;
  updateDOM();
}

// ── Hint ─────────────────────────────────────────────────
let hintsLeft = 3;
let hintHighlight = null; // { from, to }

function resetHints() {
  hintsLeft = 3;
  updateHintUI();
  clearHintHighlight();
}

function updateHintUI() {
  const btn = document.getElementById('hint-btn');
  const cnt = document.getElementById('hint-count');
  if (!btn) return;
  cnt.textContent = hintsLeft;
  btn.disabled = hintsLeft <= 0;
}

function clearHintHighlight() {
  document.querySelectorAll('.bottle-wrap').forEach(el => {
    el.classList.remove('hint-from', 'hint-to');
  });
  hintHighlight = null;
}

// BFS로 최적 다음 수 탐색
// 깊이 1: 즉각적으로 유효한 수들 중 가장 좋은 것 반환
// 휴리스틱: 완성 병 증가 > 같은 색 그룹 크기 증가 > 일반 이동
function findBestMove() {
  const n = bottles.length;
  let best = null;
  let bestScore = -Infinity;

  for (let from = 0; from < n; from++) {
    const src = bottles[from];
    // 비어있거나 이미 완성된 병은 출발 후보에서 제외
    if (src.length === 0 || isBottleComplete(src)) continue;

    for (let to = 0; to < n; to++) {
      if (from === to) continue;
      if (!canPour(from, to)) continue;

      const dst = bottles[to];
      let score = 0;

      // 이동 시뮬레이션 (원본 훼손 없이 복사본으로)
      const srcCopy = [...src];
      const dstCopy = [...dst];
      const topColor = srcCopy[0];
      let count = 0;
      for (let i = 0; i < srcCopy.length; i++) {
        if (srcCopy[i] === topColor) count++; else break;
      }
      const pour = Math.min(count, BOTTLE_CAPACITY - dstCopy.length);
      const poured = srcCopy.splice(0, pour);
      dstCopy.unshift(...poured);

      // 대상 병이 완성되면 최고 점수
      if (dstCopy.length === BOTTLE_CAPACITY && dstCopy.every(c => c === dstCopy[0])) {
        score += 1000;
      }
      // 소스 병이 완전히 비워지면 좋음 (빈 슬롯 확보)
      if (srcCopy.length === 0) score += 300;
      // 대상 병 상단의 같은 색 연속 길이가 길수록 좋음
      let dstTop = 0;
      for (let i = 0; i < dstCopy.length; i++) {
        if (dstCopy[i] === dstCopy[0]) dstTop++; else break;
      }
      score += dstTop * 50;
      // 소스 병 잔여 상단이 단색에 가까울수록 좋음
      if (srcCopy.length > 0) {
        let srcTop = 0;
        for (let i = 0; i < srcCopy.length; i++) {
          if (srcCopy[i] === srcCopy[0]) srcTop++; else break;
        }
        score += srcTop * 20;
      }
      // 빈 병으로 이동은 패널티 (마지막 수단)
      if (dst.length === 0) score -= 100;

      if (score > bestScore) {
        bestScore = score;
        best = { from, to };
      }
    }
  }
  return best;
}

function showHint() {
  if (hintsLeft <= 0 || isAnimating) return;

  // 이전 하이라이트 제거
  clearHintHighlight();

  const move = findBestMove();
  if (!move) {
    document.getElementById('hint-text').textContent = '더 이상 힌트를 찾을 수 없어요.';
    return;
  }

  hintsLeft--;
  updateHintUI();

  hintHighlight = move;

  // 출발 병: 들어올려진 상태로 강조
  const fromEl = document.getElementById(`wrap-${move.from}`);
  const toEl   = document.getElementById(`wrap-${move.to}`);
  fromEl.classList.add('hint-from');
  toEl.classList.add('hint-to');

  // 힌트 버튼 pulse
  const btn = document.getElementById('hint-btn');
  btn.classList.remove('hint-flash');
  void btn.offsetWidth;
  btn.classList.add('hint-flash');

  const fromColor = COLORS[bottles[move.from][0]].bg;
  document.getElementById('hint-text').textContent =
    `💡 이 병에서 → 저 병으로 부어보세요! (남은 힌트: ${hintsLeft})`;

  // 5초 후 자동 해제
  setTimeout(() => {
    if (hintHighlight && hintHighlight.from === move.from && hintHighlight.to === move.to) {
      clearHintHighlight();
      document.getElementById('hint-text').textContent = '';
    }
  }, 5000);
}

// ── Pour animation ──────────────────────────────────────
function animatePour(fromIdx, toIdx, onComplete) {
  isAnimating = true;
  document.getElementById('hint-text').textContent = '';

  const fromWrap = document.getElementById(`wrap-${fromIdx}`);
  const toWrap   = document.getElementById(`wrap-${toIdx}`);
  const overlay  = document.getElementById('pour-overlay');

  const fromRect = fromWrap.getBoundingClientRect();
  const toRect   = toWrap.getBoundingClientRect();

  fromWrap.style.opacity = '0';

  // ── 클론 생성 ──────────────────────────────────────────────
  const clone = document.createElement('div');
  clone.className = 'pour-clone';
  clone.style.left  = fromRect.left + 'px';
  clone.style.top   = fromRect.top  + 'px';
  clone.style.width = fromRect.width + 'px';

  const cloneNeck = document.createElement('div');
  cloneNeck.className = 'clone-neck';
  clone.appendChild(cloneNeck);

  const cloneBody = document.createElement('div');
  cloneBody.className = 'clone-body';
  const bottle = bottles[fromIdx];
  const emptySlots = BOTTLE_CAPACITY - bottle.length;
  for (let s = 0; s < BOTTLE_CAPACITY; s++) {
    const seg = document.createElement('div');
    seg.className = 'clone-seg';
    seg.style.height = (100 / BOTTLE_CAPACITY) + '%';
    if (s < emptySlots) {
      seg.style.background = 'transparent';
    } else {
      const color = bottle[s - emptySlots];
      const cd = COLORS[color];
      seg.style.background = cd.bg;
      seg.style.boxShadow = `inset 0 2px 0 rgba(255,255,255,0.22), inset 0 -1px 0 ${cd.border}`;
    }
    cloneBody.appendChild(seg);
  }
  clone.appendChild(cloneBody);
  overlay.appendChild(clone);

  // ── 위치·각도 계산 ────────────────────────────────────────
  const fromCx = fromRect.left + fromRect.width  / 2;
  const toCx   = toRect.left   + toRect.width    / 2;
  const dx = toCx - fromCx;
  const tx = dx;
  const ty = toRect.top - fromRect.top - fromRect.height * 0.08;
  const rot = dx >= 0 ? 108 : -108;

  const pourColor = COLORS[bottles[fromIdx][0]].bg;

  const TOTAL_MS    = 420;
  const streamDelay = TOTAL_MS * 0.38;
  const streamDur   = TOTAL_MS * 0.34;

  clone.style.setProperty('--tx', tx + 'px');
  clone.style.setProperty('--ty', ty + 'px');
  clone.style.setProperty('--rot', rot + 'deg');
  clone.style.animation = `bottlePour ${TOTAL_MS}ms cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`;



  // ── 소리 ──────────────────────────────────────────────────
  setTimeout(() => playPourSound(pourColor, streamDur / 1000), streamDelay);

  // ── 정리 ──────────────────────────────────────────────────
  setTimeout(() => {
    overlay.innerHTML = '';
    fromWrap.style.opacity = '';
    isAnimating = false;
    onComplete();
  }, TOTAL_MS + 20);
}


// ── Game Over ───────────────────────────────────────────
function showGameOver() {
  document.getElementById('gameover-overlay').classList.add('show');
}

// ── 레벨별 최적 이동 수 (BFS로 사전 계산) ───────────────
const LEVEL_PAR = [6, 9, 10, 14, 16, 17, 17, 21, 20, 22, 25, 27, 25, 24, 25, 25, 24, 27, 30, 28, 31, 30, 27, 30, 32, 28, 30, 31, 31, 31, 31, 36, 34, 35, 36, 34, 32, 40, 39, 40, 40, 38, 39, 42, 42, 43, 43, 43, 44, 44];
function getLevelPar(levelIdx) {
  return LEVEL_PAR[levelIdx] ?? 30;
}

// ── 별점 계산 (실제 최적 이동 수 기준) ─────────────────────
// ⭐⭐⭐: moves <= par          (최적 이하)
// ⭐⭐:   moves <= par * 1.6   (최적의 1.6배 이하)
// ⭐:    그 이상               (클리어했으면 최소 1개)
function getStars(moves, par) {
  if (moves <= par)                    return 3;
  if (moves <= Math.round(par * 1.6))  return 2;
  return 1;
}

// ── Win ─────────────────────────────────────────────────
function showWin() {
  playCompleteSound();

  const par   = getLevelPar(currentLevel);
  const stars = getStars(moves, par);

  // 별 표시
  const starsEl = document.getElementById('win-stars');
  starsEl.innerHTML = '';
  for (let i = 1; i <= 3; i++) {
    const s = document.createElement('span');
    s.textContent = '⭐';
    if (i > stars) s.classList.add('star-empty');
    starsEl.appendChild(s);
  }

  // 이동 수 메시지
  const movesEl = document.getElementById('win-moves');
  if (stars === 3) {
    movesEl.textContent = `${moves}번 만에 완벽 클리어! 🏆`;
  } else if (stars === 2) {
    movesEl.textContent = `${moves}번 만에 클리어! 👏`;
  } else {
    movesEl.textContent = `${moves}번 만에 클리어했어요!`;
  }

  // 최적 이동 수 안내
  const parEl = document.getElementById('win-par');
  const parHalf = Math.round(par * 1.5);
  if (stars === 3) {
    parEl.textContent = `최소 ${par}번으로 풀 수 있는 레벨이에요 ✨`;
  } else {
    parEl.textContent = `최소 ${par}번으로 클리어 가능해요 — ⭐⭐⭐는 ${par}번 이하!`;
  }

  document.getElementById('win-overlay').classList.add('show');
  spawnStars(stars);

  // 기록 저장
  recordClear(currentLevel, stars, moves);
}

function spawnStars(stars = 3) {
  const container = document.getElementById('stars');
  container.innerHTML = '';
  const colorArr = Object.values(COLORS).map(c => c.bg);
  const count = stars === 3 ? 80 : stars === 2 ? 50 : 25;
  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;
    const tx = (Math.random() - 0.5) * 300;
    const ty = (Math.random() - 0.5) * 300;
    star.style.cssText = `
      left:${x}px; top:${y}px;
      background:${colorArr[Math.floor(Math.random()*colorArr.length)]};
      --tx:${tx}px; --ty:${ty}px;
      animation-delay:${Math.random()*0.5}s;
      width:${4+Math.random()*8}px; height:${4+Math.random()*8}px;
    `;
    container.appendChild(star);
  }
}

// ── 진행 기록 (localStorage) ────────────────────────────
const SAVE_KEY = 'water_sort_progress_v1';

function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem(SAVE_KEY)) || {};
  } catch { return {}; }
}

function saveProgress(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch {}
}

function recordClear(levelIdx, stars, moveCount) {
  const data = loadProgress();
  const key = String(levelIdx);
  // 최고 별점만 저장 (낮은 기록으로 덮어쓰지 않음)
  if (!data[key] || data[key].stars < stars) {
    data[key] = { stars, moves: moveCount, date: new Date().toLocaleDateString('ko-KR') };
    saveProgress(data);
  }
  updateSelectOptions();
}

function updateSelectOptions() {
  const data = loadProgress();
  const sel = document.getElementById('level-select');
  if (!sel) return;
  Array.from(sel.options).forEach((opt, i) => {
    const rec = data[String(i)];
    const stars = rec ? '★'.repeat(rec.stars) + '☆'.repeat(3 - rec.stars) : '';
    // 원본 텍스트에서 별 제거 후 추가
    const base = opt.text.replace(/[★☆✓\s]+$/, '').trim();
    opt.text = rec ? `${base} ${stars}` : base;
  });
}

function openProgress() {
  const data = loadProgress();
  const cleared = Object.keys(data).length;
  const threeStars = Object.values(data).filter(v => v.stars === 3).length;
  const totalStars = Object.values(data).reduce((s, v) => s + (v.stars || 0), 0);

  document.getElementById('prog-cleared').textContent = `${cleared}/50`;
  document.getElementById('prog-three-stars').textContent = threeStars;
  document.getElementById('prog-total-stars').textContent = `${totalStars}/150`;

  const grid = document.getElementById('progress-grid');
  grid.innerHTML = '';

  for (let i = 0; i < 50; i++) {
    const rec = data[String(i)];
    const cell = document.createElement('div');
    cell.className = 'prog-cell' + (rec ? ' cleared' : '') + (i === currentLevel ? ' current' : '');
    cell.onclick = () => { closeProgress(); loadLevel(i); document.getElementById('level-select').value = i; };

    const diff = LEVELS[i].name.match(/[⭐💀]+/)?.[0] || '';
    cell.innerHTML = `
      <div class="cell-diff">${diff}</div>
      <div class="cell-num">${i + 1}</div>
      <div class="cell-stars">${rec ? '★'.repeat(rec.stars) + '☆'.repeat(3 - rec.stars) : rec === undefined ? '－' : ''}</div>
    `;
    if (rec) cell.title = `${i+1}레벨 — ★${rec.stars} | ${rec.moves}번 | ${rec.date}`;
    grid.appendChild(cell);
  }

  document.getElementById('progress-overlay').classList.add('show');
}

function closeProgress() {
  document.getElementById('progress-overlay').classList.remove('show');
}

function confirmResetProgress() {
  if (confirm('모든 플레이 기록을 초기화할까요?')) {
    localStorage.removeItem(SAVE_KEY);
    updateSelectOptions();
    closeProgress();
  }
}

// ── Init ─────────────────────────────────────────────────
loadLevel(0);
updateSelectOptions();
</script>
